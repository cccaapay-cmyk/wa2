<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trabajo Manual</title>
<style>
html, body{
  margin:0;
  padding:0;
  display:none;
  background:#f5f5f5;
}
</style>
</head>
<body>

<script>
(() => {
  const lineIds = [
    "wooo8180"
  ];

  const KEY_BAG = "line_shuffle_bag_page1_v2";
  const KEY_LAST = "line_last_pick_page1_v2";

  function getItem(key) {
    try {
      return localStorage.getItem(key);
    } catch {
      return null;
    }
  }

  function setItem(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function loadBag() {
    try {
      const raw = getItem(KEY_BAG);
      if (!raw) return null;

      const bag = JSON.parse(raw);
      if (!Array.isArray(bag) || !bag.length) return null;

      const validBag = bag.filter(n => lineIds.includes(n));
      return validBag.length ? validBag : null;
    } catch {
      return null;
    }
  }

  function pick() {
    if (!lineIds.length) return "";

    let bag = loadBag();
    const last = getItem(KEY_LAST) || "";

    if (!bag) {
      bag = shuffle(lineIds);
      if (bag.length > 1 && bag[0] === last) {
        [bag[0], bag[1]] = [bag[1], bag[0]];
      }
    }

    const current = bag[0];
    setItem(KEY_BAG, JSON.stringify(bag.slice(1)));
    setItem(KEY_LAST, current);

    return current;
  }

  const id = pick();

  if (id) {
    location.href = "line://ti/p/~" + encodeURIComponent(id);
  } else {
    document.body.style.display = "block";
    document.body.textContent = "No valid LINE ID found.";
  }
})();
</script>

</body>
</html>
