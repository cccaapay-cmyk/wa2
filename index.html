<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
</head>
<body>

<script>
(() => {
  const urls = [
    "https://lin11.ver565.com/download/?BD-FB-BR-KV-05&fbPixel=3500521793446047"
  ];

  const KEY_BAG = "web_shuffle_bag_page1_v1";
  const KEY_LAST = "web_last_pick_page1_v1";

  function getItem(key) {
    try { return localStorage.getItem(key); } catch { return null; }
  }

  function setItem(key, value) {
    try { localStorage.setItem(key, value); } catch {}
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function loadBag() {
    try {
      const raw = getItem(KEY_BAG);
      if (!raw) return null;

      const bag = JSON.parse(raw);
      if (!Array.isArray(bag) || !bag.length) return null;

      const validBag = bag.filter(u => urls.includes(u));
      return validBag.length ? validBag : null;
    } catch {
      return null;
    }
  }

  function pick() {
    if (!urls.length) return "";

    let bag = loadBag();
    const last = getItem(KEY_LAST) || "";

    if (!bag) {
      bag = shuffle(urls);
      if (bag.length > 1 && bag[0] === last) {
        [bag[0], bag[1]] = [bag[1], bag[0]];
      }
    }

    const current = bag[0];
    setItem(KEY_BAG, JSON.stringify(bag.slice(1)));
    setItem(KEY_LAST, current);

    return current;
  }

  const url = pick();

  if (url) {
    location.replace(url);
  } else {
    document.body.textContent = "No valid URL found.";
  }
})();
</script>

</body>
</html>
