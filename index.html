<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trabajo Manual</title>
<style>
html,body{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}
.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
  box-sizing:border-box;
}
.box{
  max-width:420px;
}
h1{
  margin:0 0 12px;
  font-size:28px;
}
p{
  margin:0 0 20px;
  font-size:18px;
  color:#333;
  line-height:1.6;
}
a.btn{
  display:inline-block;
  padding:14px 28px;
  background:#06C755;
  color:#fff;
  text-decoration:none;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
}
.small{
  margin-top:14px;
  font-size:14px;
  color:#666;
}
.hidden{
  display:none;
}
</style>
</head>
<body>

<div class="wrap hidden" id="fallback">
  <div class="box">
    <h1>Contactar por LINE</h1>
    <p>
      Si LINE no se abrió automáticamente, haga clic abajo.
    </p>
    <a class="btn" id="lineBtn" href="#">Abrir LINE</a>
    <div class="small">Si está en PC, puede ver la página o el código QR de LINE.</div>
  </div>
</div>

<script>
(() => {
  const lineIds = [
    "wooo8180"
  ];

  const KEY_BAG = "line_shuffle_bag_page1_v2";
  const KEY_LAST = "line_last_pick_page1_v2";

  function getItem(key) {
    try {
      return localStorage.getItem(key);
    } catch {
      return null;
    }
  }

  function setItem(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function loadBag() {
    try {
      const raw = getItem(KEY_BAG);
      if (!raw) return null;

      const bag = JSON.parse(raw);
      if (!Array.isArray(bag) || !bag.length) return null;

      const validBag = bag.filter(n => lineIds.includes(n));
      return validBag.length ? validBag : null;
    } catch {
      return null;
    }
  }

  function pick() {
    if (!lineIds.length) return "";

    let bag = loadBag();
    const last = getItem(KEY_LAST) || "";

    if (!bag) {
      bag = shuffle(lineIds);
      if (bag.length > 1 && bag[0] === last) {
        [bag[0], bag[1]] = [bag[1], bag[0]];
      }
    }

    const current = bag[0];
    setItem(KEY_BAG, JSON.stringify(bag.slice(1)));
    setItem(KEY_LAST, current);

    return current;
  }

  const id = pick();
  if (!id) {
    document.getElementById("fallback").classList.remove("hidden");
    document.querySelector("p").textContent = "No valid LINE ID found.";
    return;
  }

  const appUrl = "line://ti/p/~" + encodeURIComponent(id);
  const webUrl = "https://line.me/R/ti/p/" + encodeURIComponent(id);

  const btn = document.getElementById("lineBtn");
  btn.href = webUrl;

  const fallback = document.getElementById("fallback");

  // 先尝试拉起 LINE App
  const start = Date.now();
  window.location.href = appUrl;

  // 如果没有成功拉起，回退到网页链接
  setTimeout(() => {
    const elapsed = Date.now() - start;

    // 页面还在当前页，说明大概率没拉起成功
    if (document.visibilityState === "visible" && elapsed < 2500) {
      window.location.replace(webUrl);
    }
  }, 800);

  // 再兜底显示按钮，避免用户看到空白页
  setTimeout(() => {
    if (document.visibilityState === "visible") {
      fallback.classList.remove("hidden");
    }
  }, 1400);
})();
</script>

</body>
</html>
