<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LINE Redirect</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      display: none;
    }
  </style>
</head>
<body>
<script>
(() => {
  const rawLineIds = [
    "trabajo01",
    "trabajo02",
    "trabajo03",
    "trabajo04"
  ];

  const KEY_BAG = "line_shuffle_bag_v2";
  const KEY_LAST = "line_last_pick_v2";

  function clean(list) {
    const seen = new Set();
    const result = [];
    for (let i = 0; i < list.length; i++) {
      const value = String(list[i]).trim().replace(/^@/, "");
      if (value && !seen.has(value)) {
        seen.add(value);
        result.push(value);
      }
    }
    return result;
  }

  const lineIds = clean(rawLineIds);

  function shuffle(arr) {
    const copy = arr.slice();
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function readBag() {
    try {
      const value = JSON.parse(localStorage.getItem(KEY_BAG) || "[]");
      return Array.isArray(value) ? value : [];
    } catch (e) {
      return [];
    }
  }

  function saveBag(bag) {
    localStorage.setItem(KEY_BAG, JSON.stringify(bag));
  }

  function readLast() {
    return (localStorage.getItem(KEY_LAST) || "").trim();
  }

  function saveLast(value) {
    localStorage.setItem(KEY_LAST, value);
  }

  function getNextLineId() {
    if (!lineIds.length) return "";

    if (lineIds.length === 1) {
      const onlyOne = lineIds[0];
      saveLast(onlyOne);
      return onlyOne;
    }

    let bag = readBag().filter(id => lineIds.includes(id));
    const last = readLast();

    if (!bag.length) {
      bag = shuffle(lineIds);
      if (bag.length > 1 && bag[0] === last) {
        [bag[0], bag[1]] = [bag[1], bag[0]];
      }
    }

    let picked = bag.shift();

    if (picked === last && bag.length) {
      const next = bag.shift();
      bag.unshift(picked);
      picked = next;
    }

    saveBag(bag);
    saveLast(picked);
    return picked;
  }

  function buildLineUrl(lineId) {
    return "https://line.me/R/oaMessage/%40" + encodeURIComponent(lineId);
  }

  const nextLineId = getNextLineId();

  if (!nextLineId) {
    document.body.style.display = "block";
    document.body.innerHTML = "<p style='padding:20px;font-family:Arial,sans-serif;'>LINE ID 未配置</p>";
    return;
  }

  location.replace(buildLineUrl(nextLineId));
})();
</script>
</body>
</html>
